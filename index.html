<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポケモン タイプ相性クイズ</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="タイプクイズ">
  <meta name="theme-color" content="#0f1923">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══════════════════════════════════════════
     メイン画面（相性表）
════════════════════════════════════════════ -->
<div id="mainView">

  <!-- ヘッダー -->
  <div id="appHeader">
    <span id="appTitle">⚡ タイプ相性表</span>

    <div id="controls">

      <!-- トグルペア1：攻撃 ⇔ 防御 -->
      <div class="sw-pair">
        <span class="sw-lbl on" id="lbl-modeAtk">⚔️ 攻撃</span>
        <label class="sw-wrap">
          <input type="checkbox" id="modeSw" onchange="setMode(this.checked?'def':'atk')">
          <span class="sw-track"></span>
        </label>
        <span class="sw-lbl" id="lbl-modeDef">🛡️ 防御</span>
      </div>

      <!-- トグルペア2：グレーアウト ⇔ 選択のみ -->
      <div class="sw-pair">
        <span class="sw-lbl on" id="lbl-grayout">グレーアウト</span>
        <label class="sw-wrap">
          <input type="checkbox" id="filterSw" onchange="setFilterMode(this.checked)">
          <span class="sw-track"></span>
        </label>
        <span class="sw-lbl" id="lbl-hideUnsel">選択のみ</span>
      </div>

      <!-- タイプ選択ドロップダウン -->
      <div class="select-wrap">
        <select id="typeSelect" multiple onchange="onSelectChange()">
          <option value="ノーマル">ノーマル</option>
          <option value="ほのお">ほのお</option>
          <option value="みず">みず</option>
          <option value="でんき">でんき</option>
          <option value="くさ">くさ</option>
          <option value="こおり">こおり</option>
          <option value="かくとう">かくとう</option>
          <option value="どく">どく</option>
          <option value="じめん">じめん</option>
          <option value="ひこう">ひこう</option>
          <option value="エスパー">エスパー</option>
          <option value="むし">むし</option>
          <option value="いわ">いわ</option>
          <option value="ゴースト">ゴースト</option>
          <option value="ドラゴン">ドラゴン</option>
          <option value="あく">あく</option>
          <option value="はがね">はがね</option>
          <option value="フェアリー">フェアリー</option>
        </select>
        <span class="select-hint" id="selectHint">0 / 18 選択中</span>
      </div>

      <!-- 全選択/解除トグルボタン -->
      <button id="btnToggleAll" class="btn-sm" onclick="toggleAllTypes()">全選択</button>

      <!-- クイズスタート -->
      <button class="btn-start" onclick="startQuiz()">▶ クイズ</button>
    </div>
  </div>

  <!-- 凡例 + セル情報バー -->
  <div id="infoBar">
    <div class="chart-legend">
      <div class="legend-item"><div class="legend-box eff2-box"></div><span>○ 2倍</span></div>
      <div class="legend-item"><div class="legend-box eff05-box"></div><span>△ ½倍</span></div>
      <div class="legend-item"><div class="legend-box eff0-box"></div><span>× 無効</span></div>
      <div class="legend-item"><div class="legend-box eff1-box"></div><span>－ 等倍</span></div>
    </div>
    <div id="cellInfo"></div>
  </div>

  <!-- 相性表本体 -->
  <div class="chart-table-wrap" id="chartTableWrap">
    <table class="ct" id="chartTable"></table>
  </div>

</div><!-- /mainView -->


<!-- ══════════════════════════════════════════
     クイズ画面
════════════════════════════════════════════ -->
<div id="quizView" style="display:none;">
  <div id="quizInner">
    <button class="btn-back" onclick="quitQuiz()">← 戻る</button>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progFill"></div></div>
    <div class="score-row">
      <span>問題 <b id="qNum">1</b> / <b id="qTotal">20</b></span>
      <span>正解 <b id="scoreDisp">0</b></span>
    </div>
    <div class="question-card">
      <div class="q-label">この技のダメージ倍率は？</div>
      <div class="q-types">
        <span class="type-badge" id="atkBadge"></span>
        <span class="q-vs">の技　→</span>
        <span class="type-badge" id="defBadge"></span>
        <span class="q-vs">に対して</span>
      </div>
    </div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn-next" id="btnNext" onclick="nextQuestion()">次の問題 →</button>
  </div>
</div>


<!-- ══════════════════════════════════════════
     結果画面
════════════════════════════════════════════ -->
<div id="resultView" style="display:none;">
  <div id="resultInner">
    <div class="result-score" id="finalScore"></div>
    <div class="result-label" id="finalLabel"></div>
    <div class="result-rank"  id="finalRank"></div>
    <button class="btn-retry" onclick="backToChart()">← 相性表に戻る</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
